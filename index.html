<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Michael Redozubov | Resume Website</title>

    <style>
        :root {
            --navy-950: #071426;
            --navy-900: #0b1f3a;
            --navy-800: #12335a;

            --blue-700: #155eef;
            --blue-600: #2878ff;
            --blue-500: #3b82f6;
            --blue-100: #dceaff;
            --blue-50: #f2f7ff;

            --cyan-500: #22b8cf;
            --cyan-100: #dff8fc;

            --green-500: #16a87b;
            --purple-500: #7057e6;
            --orange-500: #f59e0b;

            --white: #ffffff;

            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-900: #0f172a;

            --header-height: 82px;
            --content-width: 1240px;

            --shadow-small:
                0 8px 24px rgba(15, 23, 42, 0.08);

            --shadow-medium:
                0 18px 50px rgba(15, 23, 42, 0.12);

            --shadow-large:
                0 30px 80px rgba(15, 23, 42, 0.16);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: var(--header-height);
        }

        body {
            min-width: 320px;

            color: var(--gray-900);

            font-family:
                Inter,
                ui-sans-serif,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;

            background-color: var(--gray-50);
            overflow-x: hidden;
        }

        button,
        a {
            font: inherit;
        }

        a {
            color: inherit;
        }

        button {
            border: none;
        }

        /* =========================
           Navigation
        ========================= */

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;

            width: 100%;
            height: var(--header-height);

            display: flex;
            align-items: center;

            background-color: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid rgba(203, 213, 225, 0.7);
            box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .header-inner {
            width: min(
                var(--content-width),
                calc(100% - 48px)
            );

            height: 100%;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;

            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;

            color: var(--navy-900);
            text-decoration: none;
        }

        .brand-mark {
            width: 42px;
            height: 42px;

            display: grid;
            place-items: center;

            color: var(--white);
            font-weight: 800;

            background:
                linear-gradient(
                    135deg,
                    var(--blue-700),
                    var(--cyan-500)
                );

            border-radius: 13px;

            box-shadow:
                0 10px 25px rgba(21, 94, 239, 0.3);
        }

        .brand-text {
            display: flex;
            flex-direction: column;

            line-height: 1.1;
        }

        .brand-title {
            font-size: 1.08rem;
            font-weight: 800;
        }

        .brand-subtitle {
            margin-top: 5px;

            color: var(--gray-500);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .navigation {
            display: flex;
            align-items: center;
            gap: 5px;

            padding: 6px;

            background-color: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 14px;
        }

        .navigation a {
            display: block;

            padding: 10px 15px;

            color: var(--gray-600);
            font-size: 0.94rem;
            font-weight: 700;
            text-decoration: none;

            border-radius: 10px;

            transition:
                color 180ms ease,
                background-color 180ms ease,
                transform 180ms ease,
                box-shadow 180ms ease;
        }

        .navigation a:hover,
        .navigation a:focus-visible {
            color: var(--navy-900);
            background-color: var(--white);

            box-shadow:
                0 5px 16px rgba(15, 23, 42, 0.08);

            transform: translateY(-1px);
            outline: none;
        }

        .navigation a.active {
            color: var(--white);

            background:
                linear-gradient(
                    135deg,
                    var(--blue-700),
                    var(--blue-600)
                );

            box-shadow:
                0 8px 18px rgba(21, 94, 239, 0.25);
        }

        .menu-button {
            display: none;

            width: 44px;
            height: 44px;

            align-items: center;
            justify-content: center;

            color: var(--navy-900);
            background-color: var(--gray-100);

            border: 1px solid var(--gray-200);
            border-radius: 12px;

            cursor: pointer;
        }

        .menu-button span,
        .menu-button span::before,
        .menu-button span::after {
            width: 20px;
            height: 2px;

            display: block;

            background-color: currentColor;
            border-radius: 2px;

            transition:
                transform 180ms ease,
                opacity 180ms ease;
        }

        .menu-button span {
            position: relative;
        }

        .menu-button span::before,
        .menu-button span::after {
            position: absolute;
            left: 0;

            content: "";
        }

        .menu-button span::before {
            top: -6px;
        }

        .menu-button span::after {
            top: 6px;
        }

        .menu-button.open span {
            background-color: transparent;
        }

        .menu-button.open span::before {
            top: 0;
            transform: rotate(45deg);
        }

        .menu-button.open span::after {
            top: 0;
            transform: rotate(-45deg);
        }

        /* =========================
           Shared sections
        ========================= */

        main {
            padding-top: var(--header-height);
        }

        .page-section {
            position: relative;

            min-height: 100vh;

            display: flex;
            align-items: center;

            padding: 100px 24px;

            overflow: hidden;
        }

        .section-container {
            position: relative;
            z-index: 2;

            width: min(var(--content-width), 100%);

            margin: 0 auto;
        }

        .section-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 9px;

            margin-bottom: 16px;

            color: var(--blue-700);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .section-eyebrow::before {
            width: 26px;
            height: 3px;

            content: "";

            background-color: var(--cyan-500);
            border-radius: 999px;
        }

        .section-heading {
            color: var(--navy-950);

            font-size:
                clamp(2.5rem, 6vw, 5.8rem);

            font-weight: 850;
            letter-spacing: -0.055em;
            line-height: 0.95;
        }

        .section-description {
            max-width: 540px;

            color: var(--gray-600);
            font-size: 1.05rem;
            line-height: 1.75;
        }

        .section-header-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 40px;

            margin-bottom: 48px;
        }

        .title-card {
            width: 100%;
            min-height: 420px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            text-align: center;

            background-color: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 30px;

            box-shadow: var(--shadow-medium);
        }

        .basic-section {
            background-color: var(--white);
        }

        .basic-section.alt {
            background:
                linear-gradient(
                    145deg,
                    var(--gray-50),
                    var(--blue-50)
                );
        }

        /* =========================
           Summary section
        ========================= */

        .summary-section {
            background:
                radial-gradient(
                    circle at 85% 20%,
                    rgba(34, 184, 207, 0.2),
                    transparent 27%
                ),
                radial-gradient(
                    circle at 10% 85%,
                    rgba(21, 94, 239, 0.15),
                    transparent 30%
                ),
                linear-gradient(
                    145deg,
                    #f8fbff 0%,
                    #edf5ff 55%,
                    #f8fafc 100%
                );
        }

        .summary-grid {
            display: grid;

            grid-template-columns:
                minmax(300px, 0.85fr)
                minmax(420px, 1.3fr);

            gap: 70px;
            align-items: center;
        }

        .profile-area {
            position: relative;
        }

        .profile-accent {
            position: absolute;
            right: -22px;
            bottom: -22px;
            z-index: 1;

            width: 170px;
            height: 170px;

            background:
                linear-gradient(
                    135deg,
                    var(--blue-700),
                    var(--cyan-500)
                );

            border-radius: 34px;
            transform: rotate(8deg);
        }

        .profile-frame {
            position: relative;
            z-index: 2;

            min-height: 540px;

            display: flex;
            align-items: stretch;

            padding: 16px;

            background-color: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: 30px;

            box-shadow: var(--shadow-large);
            backdrop-filter: blur(12px);
        }

        .profile-placeholder {
            width: 100%;
            min-height: 508px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 17px;

            padding: 30px;

            color: var(--gray-500);
            text-align: center;

            background:
                linear-gradient(
                    145deg,
                    rgba(220, 234, 255, 0.95),
                    rgba(223, 248, 252, 0.95)
                );

            border:
                2px dashed rgba(21, 94, 239, 0.36);

            border-radius: 22px;
        }

        .profile-icon {
            width: 84px;
            height: 84px;

            display: grid;
            place-items: center;

            color: var(--blue-700);
            font-size: 2rem;

            background-color: rgba(255, 255, 255, 0.72);
            border-radius: 50%;

            box-shadow: var(--shadow-small);
        }

        .profile-placeholder strong {
            color: var(--navy-800);
            font-size: 1.1rem;
        }

        .summary-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;

            margin-bottom: 20px;
            padding: 9px 14px;

            color: var(--blue-700);
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;

            background-color: rgba(255, 255, 255, 0.74);
            border: 1px solid rgba(21, 94, 239, 0.16);
            border-radius: 999px;

            box-shadow:
                0 8px 25px rgba(15, 23, 42, 0.06);
        }

        .summary-label::before {
            width: 8px;
            height: 8px;

            content: "";

            background-color: var(--green-500);
            border-radius: 50%;

            box-shadow:
                0 0 0 5px rgba(22, 168, 123, 0.12);
        }

        .summary-title {
            max-width: 760px;

            color: var(--navy-950);

            font-size:
                clamp(3.2rem, 7vw, 6.8rem);

            font-weight: 850;
            letter-spacing: -0.065em;
            line-height: 0.91;
        }

        .summary-title span {
            color: var(--blue-700);
        }

        .summary-card {
            margin-top: 34px;
            padding: 35px 38px;

            color: var(--white);

            background:
                linear-gradient(
                    135deg,
                    var(--navy-900),
                    var(--navy-800)
                );

            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;

            box-shadow: var(--shadow-medium);
        }

        .summary-card p {
            color: #dce8f8;

            font-size:
                clamp(1.08rem, 1.8vw, 1.35rem);

            line-height: 1.7;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;

            margin-top: 28px;
        }

        .stat {
            padding: 16px;

            background-color: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
        }

        .stat strong {
            display: block;

            color: var(--white);
            font-size: 1.25rem;
        }

        .stat span {
            display: block;

            margin-top: 5px;

            color: #a8bbd2;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* =========================
           History section
        ========================= */

        .history-section {
            background:
                radial-gradient(
                    circle at 3% 12%,
                    rgba(34, 184, 207, 0.12),
                    transparent 24%
                ),
                linear-gradient(
                    155deg,
                    #f4f8ff 0%,
                    #eef3f9 55%,
                    #f8fafc 100%
                );
        }

        .history-layout {
            display: grid;

            grid-template-columns:
                minmax(330px, 0.9fr)
                minmax(500px, 1.45fr);

            gap: 28px;
        }

        .timeline-panel,
        .experience-panel {
            background-color: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(203, 213, 225, 0.82);
            border-radius: 26px;

            box-shadow: var(--shadow-medium);
            backdrop-filter: blur(10px);
        }

        .timeline-panel {
            height: 630px;

            padding: 28px 18px 28px 28px;
        }

        .panel-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;

            margin-bottom: 20px;
            padding-right: 10px;
        }

        .panel-heading h3 {
            color: var(--navy-900);
            font-size: 1.15rem;
            font-weight: 800;
        }

        .panel-heading span {
            color: var(--gray-500);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .timeline-scroll {
            height: calc(100% - 48px);

            padding: 18px 18px 18px 8px;

            overflow-y: auto;
            scrollbar-color: var(--blue-700) var(--gray-100);
            scrollbar-width: thin;
        }

        .timeline-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .timeline-scroll::-webkit-scrollbar-track {
            background-color: var(--gray-100);
            border-radius: 999px;
        }

        .timeline-scroll::-webkit-scrollbar-thumb {
            background:
                linear-gradient(
                    var(--blue-700),
                    var(--cyan-500)
                );

            border-radius: 999px;
        }

        .timeline {
            position: relative;

            padding: 4px 0 4px 36px;
        }

        .timeline::before {
            position: absolute;
            top: 8px;
            bottom: 10px;
            left: 11px;

            width: 3px;

            content: "";

            background:
                linear-gradient(
                    to bottom,
                    var(--blue-700),
                    var(--cyan-500),
                    var(--green-500)
                );

            border-radius: 999px;
        }

        .timeline-item {
            position: relative;

            min-height: 125px;

            padding: 0 10px 32px 18px;
        }

        .timeline-dot {
            position: absolute;
            top: 3px;
            left: -33px;

            width: 20px;
            height: 20px;

            background-color: var(--white);
            border: 5px solid var(--blue-700);
            border-radius: 50%;

            box-shadow:
                0 0 0 6px rgba(21, 94, 239, 0.1);
        }

        .timeline-year {
            margin-bottom: 8px;

            color: var(--blue-700);
            font-size: 0.78rem;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .timeline-role {
            color: var(--navy-900);
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.35;
        }

        .timeline-company {
            margin-top: 5px;

            color: var(--gray-500);
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .experience-panel {
            min-height: 630px;

            padding: 28px;
        }

        .experience-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .experience-card {
            display: grid;

            grid-template-columns:
                76px
                minmax(135px, 0.6fr)
                minmax(220px, 1.4fr);

            gap: 22px;
